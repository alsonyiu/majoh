<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1aa264"/>
      <stop offset="1" stop-color="#0a3621"/>
    </linearGradient>
    <linearGradient id="tile" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fefcf6"/>
      <stop offset="1" stop-color="#ece7d6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>
  <!-- Tile 1 -->
  <g transform="translate(108 138) rotate(-8)">
    <rect width="120" height="170" rx="12" ry="12" fill="url(#tile)" stroke="#b8a667" stroke-width="3"/>
    <text x="60" y="118" text-anchor="middle" font-family="serif" font-weight="700" font-size="100" fill="#b22">中</text>
  </g>
  <!-- Tile 2 -->
  <g transform="translate(248 158) rotate(2)">
    <rect width="120" height="170" rx="12" ry="12" fill="url(#tile)" stroke="#b8a667" stroke-width="3"/>
    <text x="60" y="115" text-anchor="middle" font-family="serif" font-weight="700" font-size="92" fill="#1a1a1a">發</text>
  </g>
  <!-- Tile 3 -->
  <g transform="translate(180 280) rotate(-3)">
    <rect width="120" height="170" rx="12" ry="12" fill="url(#tile)" stroke="#b8a667" stroke-width="3"/>
    <text x="60" y="115" text-anchor="middle" font-family="serif" font-weight="700" font-size="92" fill="#0a3621">白</text>
  </g>
</svg>
